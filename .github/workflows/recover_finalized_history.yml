name: Recover finalized daily data from git history

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recover-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run recovery script
        run: python recover_finalized_from_git_history.py

      - name: Commit preview file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add finalized_daily_data.json finalized_daily_data_recovered_preview.json finalized_daily_data_backup_before_recovery.json || true
          git diff --cached --quiet || git commit -m "Add recovered finalized daily data preview"
          git push
